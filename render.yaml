services:
  - type: web
    name: uncounted-api-dev
    runtime: node
    branch: main
    buildCommand: yarn --frozen-lockfile install; yarn build
    startCommand: yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://uncounted-admin-dev.onrender.com,http://localhost:5173,http://localhost:15173

  - type: web
    name: uncounted-api-prod
    runtime: node
    branch: 1.0.0
    buildCommand: yarn --frozen-lockfile install; yarn build
    startCommand: yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://uncounted-admin-prod.onrender.com
